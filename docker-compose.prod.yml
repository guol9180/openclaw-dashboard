services:
  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  backend:
    image: openclaw-workshop:local
    container_name: dashboard-backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
